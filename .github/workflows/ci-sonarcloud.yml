name: CI SonarCloud

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Frontend install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Backend Gradle Test + Coverage Report
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport --no-daemon

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectName=palmery-auth
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=backend/src/main,frontend/app,frontend/lib
            -Dsonar.tests=backend/src/test
            -Dsonar.java.binaries=backend/build/classes/java/main
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.exclusions=**/.next/**,**/node_modules/**,**/build/**

      - name: Sonar Vulnerability Gate (non-main)
        if: github.ref != 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            query="pullRequest=${{ github.event.pull_request.number }}"
          else
            query="branch=${GITHUB_REF_NAME}"
          fi

          response=$(curl -sS -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&resolved=false&ps=1&${query}")
          api_errors=$(echo "${response}" | jq '.errors | length // 0')
          if [ "${api_errors}" -gt 0 ]; then
            echo "Sonar API returned errors:"
            echo "${response}" | jq -c '.errors'
            exit 1
          fi
          total=$(echo "${response}" | jq -r '.total // 0')
          echo "Sonar unresolved vulnerabilities: ${total}"
          [ "${total}" -eq 0 ]

      - name: SonarCloud Quality Gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          pollingTimeoutSec: 300
